# markdownlint-cli2 configuration (ignores and globs)
# https://github.com/DavidAnson/markdownlint-cli2
#
# Rules live in .markdownlint.yaml (also read by IDE extensions).
# This file handles CLI-specific settings: which files to skip.
#
# IMPORTANT: SKILL.md files and skill dirs are NOT ignored here — in this repo
# the skills are the deliverable (public docs rendered on GitHub), so they are
# the primary lint targets. Only true LLM instruction files and vendored dirs skip.

ignores:
  - "node_modules/**"
  - "**/node_modules/**"
  # LLM instruction files — different audience, intentionally loose structure.
  # None live in this repo today; listed defensively in case one is added.
  - "CLAUDE.md"
  - "AGENTS.md"
  - ".github/copilot-instructions.md"
  - ".github/instructions/**"
