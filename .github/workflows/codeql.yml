name: CodeQL

# This is a docs repo (Markdown skills), so there's little application code —
# CodeQL is low-volume here. It is kept for two reasons: the `actions` language
# scans these workflow files for injection / misconfiguration, and it keeps the
# repo on the tikoci public-repo "0 findings" posture. Query suite + paths-ignore
# live in .github/codeql/codeql-config.yml. See SECURITY.md.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 5 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - actions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
